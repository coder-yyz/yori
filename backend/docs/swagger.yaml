basePath: /api
definitions:
  backend_internal_model.Category:
    properties:
      children:
        description: 由 Repository 层手动填充
        items:
          $ref: '#/definitions/backend_internal_model.Category'
        type: array
      coverUrl:
        type: string
      createdAt:
        type: string
      deletedAt:
        format: date-time
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      parentId:
        description: 支持父子分类
        type: integer
      postCount:
        type: integer
      slug:
        type: string
      updatedAt:
        type: string
    type: object
  backend_internal_model.ChangePasswordReq:
    properties:
      newPassword:
        maxLength: 64
        minLength: 6
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  backend_internal_model.Comment:
    properties:
      content:
        type: string
      createdAt:
        type: string
      deletedAt:
        format: date-time
        type: string
      id:
        type: integer
      likes:
        type: integer
      parentId:
        description: nil = 顶级评论
        type: integer
      postId:
        type: integer
      replies:
        items:
          $ref: '#/definitions/backend_internal_model.Comment'
        type: array
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/backend_internal_model.UserBrief'
        description: 以下字段不写入数据库，由 Repository 层手动批量查询后填充
      userId:
        type: integer
    type: object
  backend_internal_model.CreateCategoryReq:
    properties:
      coverUrl:
        maxLength: 512
        type: string
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 64
        type: string
      parentId:
        type: integer
      slug:
        maxLength: 64
        type: string
    required:
    - name
    type: object
  backend_internal_model.CreateCommentReq:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      parentId:
        type: integer
      postId:
        type: integer
    required:
    - content
    - postId
    type: object
  backend_internal_model.CreatePostReq:
    properties:
      categoryIds:
        items:
          type: integer
        type: array
      content:
        type: string
      coverUrl:
        maxLength: 512
        type: string
      description:
        maxLength: 1000
        type: string
      metaDescription:
        maxLength: 500
        type: string
      metaKeywords:
        maxLength: 512
        type: string
      metaTitle:
        maxLength: 256
        type: string
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      tagIds:
        items:
          type: integer
        type: array
      title:
        maxLength: 256
        type: string
    required:
    - title
    type: object
  backend_internal_model.CreateTagReq:
    properties:
      name:
        maxLength: 64
        type: string
    required:
    - name
    type: object
  backend_internal_model.LoginReq:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  backend_internal_model.Post:
    properties:
      author:
        allOf:
        - $ref: '#/definitions/backend_internal_model.UserBrief'
        description: 以下字段不写入数据库，由 Repository 层手动批量查询后填充
      authorId:
        type: integer
      categories:
        items:
          $ref: '#/definitions/backend_internal_model.Category'
        type: array
      content:
        type: string
      coverUrl:
        type: string
      createdAt:
        type: string
      deletedAt:
        format: date-time
        type: string
      description:
        type: string
      id:
        type: integer
      metaDescription:
        type: string
      metaKeywords:
        type: string
      metaTitle:
        type: string
      status:
        description: draft, published, archived
        type: string
      tags:
        items:
          $ref: '#/definitions/backend_internal_model.Tag'
        type: array
      title:
        type: string
      totalComments:
        type: integer
      totalFavorites:
        type: integer
      totalShares:
        type: integer
      totalViews:
        type: integer
      updatedAt:
        type: string
    type: object
  backend_internal_model.RegisterReq:
    properties:
      displayName:
        maxLength: 64
        type: string
      email:
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  backend_internal_model.Tag:
    properties:
      createdAt:
        type: string
      deletedAt:
        format: date-time
        type: string
      id:
        type: integer
      name:
        type: string
      postCount:
        type: integer
      updatedAt:
        type: string
    type: object
  backend_internal_model.UpdateCategoryReq:
    properties:
      coverUrl:
        maxLength: 512
        type: string
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 64
        type: string
      parentId:
        type: integer
      slug:
        maxLength: 64
        type: string
    type: object
  backend_internal_model.UpdateCommentReq:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  backend_internal_model.UpdatePostReq:
    properties:
      categoryIds:
        items:
          type: integer
        type: array
      content:
        type: string
      coverUrl:
        maxLength: 512
        type: string
      description:
        maxLength: 1000
        type: string
      metaDescription:
        maxLength: 500
        type: string
      metaKeywords:
        maxLength: 512
        type: string
      metaTitle:
        maxLength: 256
        type: string
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      tagIds:
        items:
          type: integer
        type: array
      title:
        maxLength: 256
        type: string
    type: object
  backend_internal_model.UpdateProfileReq:
    properties:
      about:
        maxLength: 500
        type: string
      address:
        maxLength: 256
        type: string
      city:
        maxLength: 64
        type: string
      country:
        maxLength: 64
        type: string
      displayName:
        maxLength: 64
        type: string
      isPublic:
        type: boolean
      phoneNumber:
        maxLength: 32
        type: string
      photoURL:
        maxLength: 512
        type: string
      state:
        maxLength: 64
        type: string
      zipCode:
        maxLength: 16
        type: string
    type: object
  backend_internal_model.UpdateTagReq:
    properties:
      name:
        maxLength: 64
        type: string
    required:
    - name
    type: object
  backend_internal_model.UserBrief:
    properties:
      displayName:
        type: string
      id:
        type: integer
      photoURL:
        type: string
      username:
        type: string
    type: object
  backend_internal_model.UserResponse:
    properties:
      about:
        type: string
      address:
        type: string
      city:
        type: string
      country:
        type: string
      createdAt:
        type: string
      displayName:
        type: string
      email:
        type: string
      id:
        type: integer
      isPublic:
        type: boolean
      phoneNumber:
        type: string
      photoURL:
        type: string
      role:
        type: string
      state:
        type: string
      status:
        type: string
      username:
        type: string
      zipCode:
        type: string
    type: object
  backend_internal_pkg.PageResponse:
    properties:
      code:
        example: 0
        type: integer
      data:
        $ref: '#/definitions/backend_internal_pkg.PageResult'
      msg:
        example: success
        type: string
    type: object
  backend_internal_pkg.PageResult:
    properties:
      list: {}
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  backend_internal_pkg.Response:
    properties:
      code:
        example: 0
        type: integer
      data: {}
      msg:
        example: success
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 基于 Gin + GORM + SQLite 的个人博客后端接口文档
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: 个人博客 API
  version: "1.0"
paths:
  /admin/categories:
    post:
      consumes:
      - application/json
      parameters:
      - description: 分类信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.CreateCategoryReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Category'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 创建分类
      tags:
      - categories
  /admin/categories/{id}:
    delete:
      parameters:
      - description: 分类ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 删除分类
      tags:
      - categories
    put:
      consumes:
      - application/json
      parameters:
      - description: 分类ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.UpdateCategoryReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Category'
              type: object
      security:
      - BearerAuth: []
      summary: 更新分类
      tags:
      - categories
  /admin/tags:
    post:
      consumes:
      - application/json
      parameters:
      - description: 标签信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.CreateTagReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Tag'
              type: object
      security:
      - BearerAuth: []
      summary: 创建标签
      tags:
      - tags
  /admin/tags/{id}:
    delete:
      parameters:
      - description: 标签ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 删除标签
      tags:
      - tags
    put:
      consumes:
      - application/json
      parameters:
      - description: 标签ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.UpdateTagReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Tag'
              type: object
      security:
      - BearerAuth: []
      summary: 更新标签
      tags:
      - tags
  /admin/users:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 搜索关键词
        in: query
        name: search
        type: string
      - description: 角色筛选
        in: query
        name: role
        type: string
      - description: 状态筛选
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.PageResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 用户列表（管理员）
      tags:
      - admin
  /admin/users/{id}:
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.UserResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 获取指定用户（管理员）
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: 账号密码登录，返回 JWT Token
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      summary: 用户登录
      tags:
      - auth
  /auth/logout:
    post:
      description: 使当前 Token 失效（递增 token_version）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 登出
      tags:
      - auth
  /auth/refresh:
    post:
      description: 使用当前有效 Token 换取新 Token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 刷新 Token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 注册新用户，返回用户信息
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.RegisterReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      summary: 用户注册
      tags:
      - auth
  /categories:
    get:
      description: 分页查询顶级分类，含子分类和文章数
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.PageResponse'
      summary: 分类列表（公开）
      tags:
      - categories
  /categories/{id}:
    get:
      parameters:
      - description: 分类ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Category'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      summary: 分类详情（公开）
      tags:
      - categories
  /categories/all:
    get:
      description: 用于前端下拉选择
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/backend_internal_model.Category'
                  type: array
              type: object
      summary: 全部分类（公开，无分页）
      tags:
      - categories
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: 更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.UpdateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 更新当前用户信息
      tags:
      - users
  /me/password:
    put:
      consumes:
      - application/json
      description: 修改成功后需重新登录
      parameters:
      - description: 密码信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_internal_model.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - users
  /posts:
    get:
      description: 分页查询已发布文章，支持按分类/标签/关键词筛选
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 关键词
        in: query
        name: search
        type: string
      - description: 分类ID
        in: query
        name: categoryId
        type: integer
      - description: 标签ID
        in: query
        name: tagId
        type: integer
      - description: '排序字段: created_at/total_views/total_favorites'
        in: query
        name: sortBy
        type: string
      - description: '排序方向: asc/desc'
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.PageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      summary: 文章列表（公开）
      tags:
      - posts
  /posts/{id}:
    get:
      description: 获取已发布文章详情（同时递增浏览量）
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Post'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
      summary: 文章详情（公开）
      tags:
      - posts
  /posts/{id}/comments:
    get:
      description: 获取文章的顶级评论列表，含二级回复
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.PageResponse'
      summary: 评论列表（公开）
      tags:
      - comments
  /tags:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 搜索关键词
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_internal_pkg.PageResponse'
      summary: 标签列表（公开）
      tags:
      - tags
  /tags/{id}:
    get:
      parameters:
      - description: 标签ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/backend_internal_pkg.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_internal_model.Tag'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_internal_pkg.Response'
